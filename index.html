<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            background-color: #6200ea; /* Kodular Purple */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Client Registration</h2>
        <form action="https://script.google.com/macros/s/AKfycbzYl5LEYBeb0FfgHvajfeCCI4olSUwjOJbeMj7mfswTNoVXWWNsBF2tPBqWwuP1L_hfHg/exec" method="GET">
            
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter Name" required>

            <label for="number">Number</label>
            <input type="number" id="number" name="number" placeholder="Enter Number" required>

            <label for="pincode">Pin Code</label>
            <input type="number" id="pincode" name="pincode" placeholder="Enter Pin Code" required>

            <button type="submit">Submit</button>
            
        </form>
    </div>

</body>
</html>
